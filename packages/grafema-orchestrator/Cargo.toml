[package]
name = "grafema-orchestrator"
version = "0.1.0"
edition = "2021"
description = "Orchestrator for Grafema per-file analysis pipeline"

[lib]
name = "grafema_orchestrator"
path = "src/lib.rs"

[[bin]]
name = "grafema-orchestrator"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
tokio = { version = "1", features = ["full"] }
rmp-serde = "1"
blake3 = "1"
rayon = "1"
ignore = "0.4"
glob = "0.3"
anyhow = "1"
tracing = "0.1"
tracing-subscriber = "0.3"
oxc_parser = "0.116"
oxc_ast = { version = "0.116", features = ["serialize"] }
oxc_allocator = "0.116"
oxc_span = "0.116"
syn = { version = "2", features = ["full", "extra-traits", "parsing"] }
proc-macro2 = { version = "1", features = ["span-locations"] }
quote = "1"

[dev-dependencies]
tempfile = "3"
